<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나혼자보는웹뷰어</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* 🌟 컨트롤 패널 (상단 메뉴) */
        .controls { margin-bottom: 20px; padding: 15px; background-color: #1e1e1e; border: 1px solid #333; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%; max-width: 800px; box-sizing: border-box; }
        .drive-auth-section { display: flex; gap: 10px; align-items: center; width: 100%; justify-content: center; border-bottom: 1px solid #444; padding-bottom: 15px; flex-wrap: wrap; text-align: center; }
        .mode-selector { display: flex; gap: 15px; font-size: 14px; font-weight: bold; margin-top: 5px; align-items: center; justify-content: center; width: 100%;}
        
        /* 🌟 마지막으로 본 회차 표시 패널 */
        .last-read-panel { width: 100%; max-width: 800px; background-color: #2c3e50; color: #ecf0f1; padding: 12px 20px; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; font-size: 15px; font-weight: bold; text-align: center; border: 1px solid #34495e; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .last-read-title { color: #f1c40f; margin-left: 5px; }

        /* 🌟 드라이브 자체 탐색기 (라이브러리) */
        .library-panel { width: 100%; max-width: 800px; background-color: #1e1e1e; border: 1px solid #333; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); display: none; flex-direction: column; overflow: hidden; margin-bottom: 20px; }
        .lib-header { display: flex; align-items: center; background-color: #2c2c2c; padding: 12px 15px; border-bottom: 1px solid #444; font-weight: bold; gap: 15px; }
        .lib-list { display: flex; flex-direction: column; max-height: 60vh; overflow-y: auto; }
        .lib-item { padding: 15px 20px; border-bottom: 1px solid #333; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 15px; transition: background-color 0.2s; }
        .lib-item:hover { background-color: #2a2a2a; }
        .lib-item:last-child { border-bottom: none; }
        .folder-icon { font-size: 1.2em; }

        /* 🌟 시리즈 이동 네비게이션 바 */
        .episode-nav { display: none; width: 100%; max-width: 800px; justify-content: space-between; align-items: center; background-color: #2c2c2c; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #444; }
        .episode-title { font-size: 14px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 50%; text-align: center; }
        .ep-btn { background-color: #555; padding: 8px 15px; font-size: 13px; border-radius: 4px; border: none; color: white; cursor: pointer; font-weight: bold;}
        .ep-btn:hover:not(:disabled) { background-color: #777; }
        .ep-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .back-to-list-btn { background-color: #d84315; }
        .back-to-list-btn:hover { background-color: #bf360c; }

        /* 🌟 뷰어 영역 */
        #viewer-container { width: 100%; max-width: 800px; background-color: #1e1e1e; min-height: 500px; border: 1px solid #333; box-shadow: 0 4px 8px rgba(0,0,0,0.5); display: none; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; margin-bottom: 20px; }
        #text-content { display: none; width: 100%; height: 600px; white-space: pre-wrap; line-height: 1.8; font-size: 16px; overflow-y: auto; padding: 10px; color: #ccc; }
        .page-mode-img { max-width: 100%; max-height: 85vh; object-fit: contain; display: none; }
        .scroll-mode-container { display: none; width: 100%; flex-direction: column; align-items: center; gap: 0; }
        .scroll-mode-container img { width: 100%; max-width: 100%; display: block; }

        .nav-buttons { margin-top: 15px; display: none; align-items: center; gap: 15px; }
        button { padding: 10px 20px; cursor: pointer; background-color: #3f51b5; color: white; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s;}
        button:hover { background-color: #303f9f; }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        .google-btn { background-color: #db4437; }
        .google-btn:hover { background-color: #c53929; }
        .next-ep-big-btn { width: 100%; margin-top: 30px; padding: 20px; background-color: #2e7d32; font-size: 18px; border-radius: 8px; }
        .next-ep-big-btn:hover { background-color: #1b5e20; }

        @media (max-width: 800px) {
            body { padding: 0; background-color: #000; }
            .controls, .last-read-panel, .library-panel, .episode-nav { border-radius: 0; border-left: none; border-right: none; margin-bottom: 0; }
            #viewer-container { padding: 0; border: none; box-shadow: none; min-height: 100vh; background-color: #000; }
            #text-content { padding: 15px; height: 80vh; }
            .page-mode-img { max-height: 90vh; }
            .nav-buttons { padding-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <div class="drive-auth-section">
            <button id="auth-btn" class="google-btn">구글 계정 연결하기</button>
            <span id="login-status" style="font-size: 0.9em; color: #aaa;">로그인되지 않음</span>
        </div>
        
        <div class="mode-selector">
            <label><input type="radio" name="view-mode" value="page" checked> 페이지 보기</label>
            <label><input type="radio" name="view-mode" value="scroll"> 웹툰 보기 (스크롤)</label>
            <button id="top-back-to-list-btn" class="ep-btn back-to-list-btn" style="display: none; margin-left: 10px;">📂 드라이브 목록</button>
        </div>
    </div>

    <div class="last-read-panel" id="last-read-panel">
        🔖 마지막으로 본 회차: <span id="last-read-title" class="last-read-title">기록 없음</span>
    </div>

    <div class="library-panel" id="library-panel">
        <div class="lib-header">
            <button id="lib-back-btn" class="ep-btn" style="display:none; padding: 5px 10px;">⬅️ 상위 폴더</button>
            <span id="lib-current-path">내 드라이브</span>
        </div>
        <div id="library-loading" style="display:none; text-align:center; padding: 30px; color: #aaa;">데이터를 불러오는 중입니다...</div>
        <div id="library-list" class="lib-list"></div>
    </div>

    <div class="episode-nav" id="episode-nav">
        <button id="ep-prev-btn" class="ep-btn">⬅️ 이전 화</button>
        <span id="ep-current-title" class="episode-title">-</span>
        <button id="ep-next-btn" class="ep-btn">다음 화 ➡️</button>
    </div>

    <div id="viewer-container">
        <div id="text-content"></div>
        <img id="image-content" class="page-mode-img" alt="만화 이미지">
        <div id="scroll-container" class="scroll-mode-container"></div>
    </div>

    <div class="nav-buttons" id="nav-buttons">
        <button id="prev-btn">이전</button>
        <span id="page-info">0 / 0</span>
        <button id="next-btn">다음</button>
    </div>

    <script>
        const CLIENT_ID = '771601429632-ovcu0c9ef1rm93tueebeskb4nd4bfp2d.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';

        let tokenClient;
        let accessToken = null;

        // 라이브러리 (탐색기) 관리 변수
        let driveHistory = [];
        let currentPlaylist = [];
        let currentPlaylistIndex = -1;

        document.addEventListener('DOMContentLoaded', () => {
            const savedTitle = localStorage.getItem('last_read_episode_title');
            if (savedTitle) document.getElementById('last-read-title').textContent = savedTitle;
        });

        function saveLastReadTitle(fileName) {
            const cleanName = fileName.replace(/\.[^/.]+$/, "");
            localStorage.setItem('last_read_episode_title', cleanName);
            document.getElementById('last-read-title').textContent = cleanName;
        }

        function gisLoaded() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID, scope: SCOPES,
                callback: (resp) => {
                    if (resp.error) return;
                    accessToken = resp.access_token;
                    const expireTime = new Date().getTime() + (3500 * 1000); 
                    localStorage.setItem('gdrive_access_token', accessToken);
                    localStorage.setItem('gdrive_token_expire', expireTime);
                    showLoggedInUI();
                },
            });
            checkAuthButton();
        }

        function checkAuthButton() {
            const savedToken = localStorage.getItem('gdrive_access_token');
            const expireTime = localStorage.getItem('gdrive_token_expire');
            const now = new Date().getTime();

            if (savedToken && expireTime && now < parseInt(expireTime)) {
                accessToken = savedToken;
                showLoggedInUI();
            }

            document.getElementById('auth-btn').onclick = () => { tokenClient.requestAccessToken({prompt: ''}); };
        }

        function showLoggedInUI() {
            document.getElementById('auth-btn').style.display = 'none';
            document.getElementById('login-status').textContent = '구글 드라이브 연결됨';
            
            closeViewer();
            
            if (driveHistory.length === 0) {
                navigateToFolder('root', '내 드라이브', false);
            }
        }

        async function navigateToFolder(folderId, folderName, isBack = false) {
            const loading = document.getElementById('library-loading');
            const listEl = document.getElementById('library-list');
            
            loading.style.display = 'block';
            listEl.innerHTML = '';

            try {
                const query = encodeURIComponent(`'${folderId}' in parents and trashed=false`);
                const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${query}&orderBy=folder,name&fields=files(id,name,mimeType)&pageSize=1000`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                
                if (res.status === 401) {
                    alert("인증이 만료되었습니다. 새로고침 후 다시 연결해 주세요.");
                    localStorage.clear(); location.reload(); return;
                }

                const data = await res.json();
                
                if (!isBack) {
                    driveHistory.push({id: folderId, name: folderName});
                }
                
                updateLibraryHeader();
                renderLibrary(data.files);

            } catch (error) {
                console.error(error); alert("폴더 내용을 읽어오지 못했습니다.");
            } finally {
                loading.style.display = 'none';
            }
        }

        function updateLibraryHeader() {
            const backBtn = document.getElementById('lib-back-btn');
            const pathText = document.getElementById('lib-current-path');
            
            if (driveHistory.length > 1) {
                backBtn.style.display = 'block';
                pathText.textContent = driveHistory[driveHistory.length - 1].name;
            } else {
                backBtn.style.display = 'none';
                pathText.textContent = '내 드라이브 (최상위)';
            }
        }

        document.getElementById('lib-back-btn').onclick = () => {
            if (driveHistory.length > 1) {
                driveHistory.pop();
                const prev = driveHistory[driveHistory.length - 1];
                navigateToFolder(prev.id, prev.name, true);
            }
        };

        function renderLibrary(files) {
            const listEl = document.getElementById('library-list');
            
            const validItems = files.filter(f => {
                if (f.mimeType === 'application/vnd.google-apps.folder') return true;
                if (f.name.toLowerCase().match(/\.(cbz|zip|txt)$/)) return true;
                return false;
            });

            currentPlaylist = validItems.filter(f => f.mimeType !== 'application/vnd.google-apps.folder');

            if (validItems.length === 0) {
                listEl.innerHTML = '<div style="padding: 20px; text-align: center; color: #888;">이 폴더에는 표시할 만화나 폴더가 없습니다.</div>';
                return;
            }

            validItems.forEach(item => {
                const isFolder = item.mimeType === 'application/vnd.google-apps.folder';
                const div = document.createElement('div');
                div.className = 'lib-item';
                div.innerHTML = `<span class="folder-icon">${isFolder ? '📁' : '📖'}</span> <span>${item.name}</span>`;
                
                div.onclick = () => {
                    if (isFolder) navigateToFolder(item.id, item.name, false);
                    else openViewerWithFile(item.id, item.name);
                };
                listEl.appendChild(div);
            });
        }

        async function openViewerWithFile(fileId, fileName) {
            document.getElementById('library-panel').style.display = 'none';
            document.getElementById('last-read-panel').style.display = 'none';
            document.getElementById('viewer-container').style.display = 'flex';
            document.getElementById('episode-nav').style.display = 'flex';
            document.getElementById('top-back-to-list-btn').style.display = 'block';

            document.getElementById('ep-current-title').textContent = "파일 다운로드 중...";
            
            currentPlaylistIndex = currentPlaylist.findIndex(f => f.id === fileId);
            updateEpisodeNav(fileName);

            try {
                const response = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                const blob = await response.blob();
                const fileObj = new File([blob], fileName, { type: blob.type });

                saveLastReadTitle(fileName);
                resetViewerState();

                if (fileName.toLowerCase().endsWith('.txt')) handleTextFile(fileObj);
                else if (fileName.toLowerCase().endsWith('.cbz') || fileName.toLowerCase().endsWith('.zip')) handleCbzFile(fileObj);

            } catch (error) {
                console.error(error); alert("파일 다운로드에 실패했습니다.");
            }
        }

        function closeViewer() {
            resetViewerState();
            document.getElementById('viewer-container').style.display = 'none';
            document.getElementById('episode-nav').style.display = 'none';
            document.getElementById('top-back-to-list-btn').style.display = 'none';
            
            document.getElementById('last-read-panel').style.display = 'block';
            if(accessToken) document.getElementById('library-panel').style.display = 'flex';
        }

        document.getElementById('top-back-to-list-btn').onclick = closeViewer;

        function updateEpisodeNav(fileName) {
            const title = document.getElementById('ep-current-title');
            const prevBtn = document.getElementById('ep-prev-btn');
            const nextBtn = document.getElementById('ep-next-btn');

            if (currentPlaylist.length > 0) {
                title.textContent = fileName.replace(/\.[^/.]+$/, "");
                prevBtn.disabled = (currentPlaylistIndex <= 0);
                nextBtn.disabled = (currentPlaylistIndex === -1 || currentPlaylistIndex >= currentPlaylist.length - 1);
            }
        }

        document.getElementById('ep-prev-btn').onclick = () => {
            if (currentPlaylistIndex > 0) {
                const prevFile = currentPlaylist[currentPlaylistIndex - 1];
                openViewerWithFile(prevFile.id, prevFile.name);
            }
        };

        document.getElementById('ep-next-btn').onclick = () => {
            if (currentPlaylistIndex < currentPlaylist.length - 1) {
                const nextFile = currentPlaylist[currentPlaylistIndex + 1];
                openViewerWithFile(nextFile.id, nextFile.name);
            }
        };

        const textContent = document.getElementById('text-content');
        const imageContent = document.getElementById('image-content');
        const scrollContainer = document.getElementById('scroll-container');
        const navButtons = document.getElementById('nav-buttons');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const pageInfo = document.getElementById('page-info');
        const modeRadios = document.querySelectorAll('input[name="view-mode"]');

        let imageFiles = [];
        let currentIndex = 0;
        let currentMode = 'page';

        modeRadios.forEach(radio => {
            radio.addEventListener('change', (e) => {
                currentMode = e.target.value;
                if (imageFiles.length > 0) refreshViewer();
            });
        });

        function resetViewerState() {
            textContent.style.display = 'none'; imageContent.style.display = 'none';
            scrollContainer.style.display = 'none'; navButtons.style.display = 'none';
            scrollContainer.innerHTML = ''; imageFiles = []; currentIndex = 0;
            window.scrollTo(0, 0);
        }

        function handleTextFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                textContent.textContent = e.target.result; 
                textContent.style.display = 'block'; 
            };
            reader.readAsText(file, 'utf-8');
        }

        async function handleCbzFile(file) {
            try {
                const zip = new JSZip();
                const zipContent = await zip.loadAsync(file);
                zipContent.forEach((relativePath, zipEntry) => {
                    if (relativePath.match(/\.(jpg|jpeg|png|gif|webp)$/i) && !zipEntry.dir) imageFiles.push(zipEntry);
                });
                imageFiles.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
                if (imageFiles.length > 0) {
                    refreshViewer();
                }
            } catch (error) { alert("파일 처리 오류"); }
        }

        function refreshViewer() {
            if (currentMode === 'page') {
                scrollContainer.style.display = 'none'; imageContent.style.display = 'block'; navButtons.style.display = 'flex';
                renderPageMode(currentIndex);
            } else {
                imageContent.style.display = 'none'; navButtons.style.display = 'none'; scrollContainer.style.display = 'flex';
                renderScrollMode();
            }
        }

        async function renderPageMode(index) {
            const file = imageFiles[index];
            const blob = await file.async("blob");
            imageContent.src = URL.createObjectURL(blob);
            pageInfo.textContent = `${index + 1} / ${imageFiles.length}`;
            prevBtn.disabled = (index === 0); nextBtn.disabled = (index === imageFiles.length - 1);
            window.scrollTo(0, 0);
        }

        async function renderScrollMode() {
            if (scrollContainer.innerHTML !== '') return;
            for (const file of imageFiles) {
                const blob = await file.async("blob");
                const img = document.createElement('img');
                img.src = URL.createObjectURL(blob);
                scrollContainer.appendChild(img);
            }
            
            if (currentPlaylist.length > 0 && currentPlaylistIndex < currentPlaylist.length - 1) {
                const bigNextBtn = document.createElement('button');
                bigNextBtn.className = 'next-ep-big-btn';
                bigNextBtn.textContent = "다음 화 보기 ➡️";
                bigNextBtn.onclick = () => {
                    const nextFile = currentPlaylist[currentPlaylistIndex + 1];
                    openViewerWithFile(nextFile.id, nextFile.name);
                };
                scrollContainer.appendChild(bigNextBtn);
            }
        }

        prevBtn.addEventListener('click', () => { if (currentIndex > 0) { currentIndex--; renderPageMode(currentIndex); } });
        nextBtn.addEventListener('click', () => { if (currentIndex < imageFiles.length - 1) { currentIndex++; renderPageMode(currentIndex); } });
    </script>
</body>
</html>
